name: uvds_app
description: "UVDS - Union pour la Vie et le Développement Social"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 FIREBASE (aligné et stable)
  firebase_core: ^3.15.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.0

  # 🌐 Network / utils
  connectivity_plus: ^6.0.0
  http: ^1.2.0

  # 📷 Media
  image_picker: ^1.1.0

  # 📤 SHARE FIX (important)
  share_plus: ^13.1.0

  # 🗺️ Maps & location
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0

  # 📊 Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_uvds.png"
  adaptive_icon_background: "#1E7A3C"
  adaptive_icon_foreground: "assets/images/logo_uvds.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/